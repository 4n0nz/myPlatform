logLevel: info
api: yes
apiAddress: 127.0.0.1:9997

# RTSP is localhost-only; used internally for the ffmpeg transcode below.
rtsp: yes
rtspAddress: 127.0.0.1:8554
rtmp: no
srt: no

# WebRTC ingest (WHIP) from the admin browser + egress (WHEP).
webrtc: yes
webrtcAddress: :8889
webrtcAllowOrigins: ['*']
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: :8189
# Set this to the media server's LAN IP so on-LAN broadcasters connect directly.
webrtcAdditionalHosts: [192.168.2.141]

# HLS egress for viewers (works through any proxy / Cloudflare Tunnel).
hls: yes
hlsAddress: :8888
hlsAllowOrigins: ['*']
hlsVariant: lowLatency
hlsAlwaysRemux: yes

paths:
  # Admin publishes the camera (H.264/Opus via WHIP) to "cam".
  # ffmpeg copies the video and transcodes Opus -> AAC into "cam2",
  # which viewers play over HLS (H.264/AAC, compatible everywhere incl. iOS).
  cam:
    runOnReady: ffmpeg -probesize 32 -analyzeduration 0 -fflags nobuffer -flags low_delay -rtsp_transport tcp -i rtsp://localhost:8554/cam -c:v copy -c:a aac -b:a 128k -f rtsp -rtsp_transport tcp rtsp://localhost:8554/cam2
    runOnReadyRestart: yes
  all_others:
